general {
    lock_cmd = pidof hyprlock || hyprlock     # Bloquea la sesión con hyprlock (evita múltiples instancias).
    before_sleep_cmd = loginctl lock-session  # Bloquea la sesión antes de que el PC se suspenda (capa extra de seguridad).
    after_sleep_cmd = hyprctl dispatch dpms on # Enciende el monitor al reanudar de la suspensión.
}

listener {
    timeout = 300                             # 5 minutos de inactividad.
    on-timeout = loginctl lock-session        # Bloquea la pantalla.
}

listener {
    timeout = 330                             # 5.5 minutos de inactividad (30 segundos después del bloqueo).
    on-timeout = hyprctl dispatch dpms off    # Apaga los monitores.
    on-resume = hyprctl dispatch dpms on      # Enciende los monitores al detectar actividad.
}

listener {
    timeout = 1800                            # 30 minutos de inactividad.
    on-timeout = systemctl suspend            # Suspende el sistema.
}